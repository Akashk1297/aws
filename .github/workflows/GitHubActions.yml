name: Test pipeline

# Triggers the workflow manually or whenever code is pushed to the repo
on: [push, workflow_dispatch]

jobs:
  hello-world-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Hello World Script
        run: |
          pwd
          ls -r /home/runner/work/aws/aws/
  python-log-parse-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run log parser script
        run: python codepipeline/src/log-parse.py
